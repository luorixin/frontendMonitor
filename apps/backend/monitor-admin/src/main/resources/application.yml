server:
  port: 8080

spring:
  application:
    name: monitor-backend
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/monitor?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:luorixin}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:2}
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

mybatis:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.monitor.system.domain
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: mysql
  reasonable: true

app:
  cors:
    allowed-origin-patterns:
      - "http://localhost:3000"
      - "http://127.0.0.1:3000"
      - "http://localhost:3001"
      - "http://127.0.0.1:3001"
      - "http://localhost:4173"
      - "http://127.0.0.1:4173"
      - "http://localhost:4174"
      - "http://127.0.0.1:4174"
      - "http://localhost:4175"
      - "http://127.0.0.1:4175"
      - "http://localhost:4176"
      - "http://127.0.0.1:4176"
      - "http://localhost:8081"
      - "http://127.0.0.1:8081"
      - "http://localhost:19006"
      - "http://127.0.0.1:19006"
  auth:
    jwt-secret: ${JWT_SECRET:monitor-backend-secret-key-min-32-bytes!}
    issuer: ${JWT_ISSUER:monitor-backend}
    access-token-ttl: ${JWT_ACCESS_TTL:30}
    refresh-token-ttl: ${JWT_REFRESH_TTL:720}
  monitor:
    collect:
      max-events-per-request: ${MONITOR_COLLECT_MAX_EVENTS:100}
      max-payload-bytes: ${MONITOR_COLLECT_MAX_PAYLOAD_BYTES:262144}
      max-image-data-bytes: ${MONITOR_COLLECT_MAX_IMAGE_DATA_BYTES:4096}
      rate-limit-per-minute: ${MONITOR_COLLECT_RATE_LIMIT_PER_MINUTE:6000}
    alert:
      evaluate-cron: ${MONITOR_ALERT_EVALUATE_CRON:0 */1 * * * ?}
    source-map:
      max-file-bytes: ${MONITOR_SOURCE_MAP_MAX_FILE_BYTES:2097152}
    replay:
      max-payload-bytes: ${MONITOR_REPLAY_MAX_PAYLOAD_BYTES:262144}
    retention:
      event-days: ${MONITOR_RETENTION_EVENT_DAYS:30}
      aggregate-days: ${MONITOR_RETENTION_AGGREGATE_DAYS:180}
