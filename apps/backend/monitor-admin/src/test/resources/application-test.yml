spring:
  datasource:
    url: jdbc:h2:mem:monitor;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    baseline-on-migrate: false
  data:
    redis:
      host: 127.0.0.1
      port: 6379

app:
  auth:
    jwt-secret: monitor-backend-secret-key-min-32-bytes!
