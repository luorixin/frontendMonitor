name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          commit: "chore: release packages"
          title: "chore: release packages"
          version: pnpm version-packages
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish preflight diagnostics
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          echo "github.repository: ${{ github.repository }}"
          echo "github.workflow: ${{ github.workflow }}"
          echo "github.workflow_ref: ${{ github.workflow_ref }}"
          echo "github.ref: ${{ github.ref }}"
          echo "github.sha: ${{ github.sha }}"
          echo "github.event_name: ${{ github.event_name }}"
          echo "runner.os: ${{ runner.os }}"
          echo "runner.environment: ${{ runner.environment }}"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN set: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+yes}"
          echo "NODE_AUTH_TOKEN set: ${NODE_AUTH_TOKEN:+yes}"
          echo "NPM_TOKEN set: ${NPM_TOKEN:+yes}"
          npm config get registry
          npm --version
          node --version
          npm config list
          npm ping
          npm view frontend-monitor-core version
          npm view frontend-monitor-vue3 version
          npm view frontend-monitor-react version
          npm view frontend-monitor-nuxt3 version
          npm view frontend-monitor-core repository --json
          npm view frontend-monitor-vue3 repository --json
          npm view frontend-monitor-react repository --json
          npm view frontend-monitor-nuxt3 repository --json
        env:
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""

      - name: Publish packages
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: pnpm publish-packages:local
        env:
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""
